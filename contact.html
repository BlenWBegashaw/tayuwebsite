<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | BLU</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-b from-gray-900 via-gray-800 to-black text-white">

<!-- ================= NAVBAR ================= -->
<!-- ===================== NAVBAR ===================== -->
<nav class="sticky top-0 z-50 backdrop-blur bg-gray-900/70 flex items-center justify-between px-4 md:px-8 py-3 md:py-4 border-b border-gray-700">

  <img src="images/logo.png"
       class="w-10 md:w-14 mix-blend-screen"
       alt="TAJU Logo"/>

  <ul class="hidden md:flex space-x-6 lg:space-x-14 text-sm md:text-2xl">
    <li><a href="index.html" class="hover:text-yellow-400">Home</a></li>
    <li><a href="equipment.html" class="hover:text-yellow-400">Equipment</a></li>
    <li><a href="contact.html" class="hover:text-yellow-400">Contact</a></li>
  </ul>

</nav>

<!-- ================= HEADER ================= -->
<section class="text-center py-10 px-4">
  <h1 class="text-3xl md:text-4xl font-bold text-yellow-400">
    Contact BLU
  </h1>

  <p class="text-gray-300 mt-2 text-sm md:text-base">
    We respond quickly to all inquiries.
  </p>
</section>

<!-- ================= CONTACT INFO ================= -->
<section class="max-w-5xl mx-auto px-4 md:px-8 mb-10">

  <div class="grid md:grid-cols-3 gap-6 text-center">

    <!-- PHONE -->
    <a href="tel:+251900000000"
       class="bg-gray-800 p-6 rounded-xl border border-gray-700 hover:border-yellow-400 transition">

      <h2 class="text-lg font-semibold text-yellow-400">Phone</h2>
      <p class="text-gray-300 mt-2">+251 900 000 000</p>
      <p class="text-sm text-gray-500 mt-1">Click to call</p>

    </a>

    <!-- EMAIL -->
    <a href="mailto:info@blu.com"
       class="bg-gray-800 p-6 rounded-xl border border-gray-700 hover:border-yellow-400 transition">

      <h2 class="text-lg font-semibold text-yellow-400">Email</h2>
      <p class="text-gray-300 mt-2">info@blu.com</p>
      <p class="text-sm text-gray-500 mt-1">Click to email</p>

    </a>

    <!-- ADDRESS -->
    <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">

      <h2 class="text-lg font-semibold text-yellow-400">Address</h2>
      <p class="text-gray-300 mt-2">Addis Ababa, Ethiopia</p>
      <p class="text-sm text-gray-500 mt-1">Main Office</p>

    </div>

  </div>

</section>

<!-- ================= FORM ================= -->
<section class="max-w-4xl mx-auto px-4 pb-16">

  <form id="contactForm"
        action="https://formspree.io/f/xojpjgrg"
        method="POST"
        class="bg-gray-800 p-5 md:p-8 rounded-xl space-y-4 border border-gray-700 shadow-lg">

    <input type="text"
           name="name"
           placeholder="Your Name"
           required
           class="w-full p-3 rounded bg-gray-900 border border-gray-700 text-white">

    <input type="email"
           name="email"
           placeholder="Your Email"
           required
           class="w-full p-3 rounded bg-gray-900 border border-gray-700 text-white">

    <textarea name="message"
              id="messageBox"
              rows="6"
              placeholder="Your Message"
              required
              class="w-full p-3 rounded bg-gray-900 border border-gray-700 text-white"></textarea>

    <button type="submit"
            class="w-full bg-yellow-500 text-black py-3 rounded font-semibold hover:bg-yellow-400 transition">
      Send Message
    </button>

  </form>

</section>

<!-- ================= SUCCESS MESSAGE ================= -->
<div id="successMessage"
     class="hidden fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-green-500 text-black px-6 py-3 rounded-full shadow-lg font-semibold">
  ✅ Message Sent Successfully
</div>

<!-- ================= AUTO FILL + FORM SCRIPT ================= -->
<script>
// AUTO FILL FROM EQUIPMENT PAGE
window.onload = function () {
  const params = new URLSearchParams(window.location.search);
  let message = params.get("message");

  if (message) {
    message = decodeURIComponent(message);

    const formatted =
`📩 Equipment Quote Request

${message}

---
Sent from BLU Equipment Page`;

    document.getElementById("messageBox").value = formatted;
  }
};


// NO PAGE RELOAD FORM SUBMISSION
const form = document.getElementById("contactForm");
const successMessage = document.getElementById("successMessage");

form.addEventListener("submit", async function (e) {
  e.preventDefault();

  const data = new FormData(form);

  await fetch(form.action, {
    method: "POST",
    body: data,
    headers: { "Accept": "application/json" }
  });

  // show success popup
  successMessage.classList.remove("hidden");

  // reset form
  form.reset();

  // hide popup after 3 seconds
  setTimeout(() => {
    successMessage.classList.add("hidden");
  }, 3000);
});
</script>

</body>
</html>
