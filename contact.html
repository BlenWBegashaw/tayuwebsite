<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | TAJU</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html { scroll-behavior: smooth; }

    .fade-up {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease;
    }
    .fade-up.show {
      opacity: 1;
      transform: translateY(0);
    }

    .menu-hidden {
      opacity: 0;
      transform: translateY(-10px);
      pointer-events: none;
    }
    .menu-show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
  </style>
</head>

<body class="bg-gradient-to-b from-gray-900 via-gray-800 to-black text-white">

<!-- ================= NAVBAR ================= -->
<nav class="fixed top-0 w-full z-50 backdrop-blur bg-gray-900/70 px-4 py-3 border-b border-gray-700 flex items-center justify-between">

  <img src="images/logo.png" class="w-10 mix-blend-screen" />

  <ul class="hidden md:flex space-x-10 text-lg">
    <li><a href="index.html" class="hover:text-yellow-400">Home</a></li>
    <li><a href="equipment.html" class="text-yellow-400">Equipment</a></li>
    <li><a href="contact.html" class="hover:text-yellow-400">Contact</a></li>
  </ul>

  <button id="menuBtn" class="md:hidden text-2xl">☰</button>

  <!-- FIXED: removed menu-hidden misuse -->
  <div id="mobileMenu"
       class="absolute top-full left-1/2 -translate-x-1/2 mt-3 w-[90%] max-w-md bg-black border-t-4 border-yellow-400 rounded-lg shadow-2xl opacity-0 pointer-events-none transition">

    <div class="flex flex-col text-xl py-6 px-6 space-y-6">
      <a href="index.html" onclick="toggleMenu()">Home</a>
      <a href="equipment.html" onclick="toggleMenu()" class="text-yellow-400">Equipment</a>
      <a href="contact.html" onclick="toggleMenu()">Contact</a>
    </div>
  </div>
</nav>

<!-- ================= HEADER ================= -->
<section class="text-center py-8 md:py-12 px-4 mt-16">
  <h1 class="text-3xl md:text-4xl font-bold text-yellow-400">
    Contact TAJU
  </h1>

  <p class="text-gray-300 mt-2 text-sm md:text-base">
    We respond quickly to all inquiries.
  </p>
</section>

<!-- ================= CONTACT INFO ================= -->
<section class="max-w-6xl mx-auto px-4 pb-16">

  <div class="flex flex-col md:flex-row gap-6 items-start">

    <!-- LEFT: CONTACT INFO -->
    <div class="flex flex-col gap-3 w-full md:w-1/3">

      <a href="tel:+251900000000"
         class="bg-gray-800 p-3 rounded-lg border border-gray-700 hover:border-yellow-400 transition">

        <h2 class="text-base font-semibold text-yellow-400">Phone</h2>
        <p class="text-gray-300 mt-1 text-sm">+251980705815</p>
        <p class="text-xs text-gray-500 mt-1">Click to call</p>

      </a>

      <a href="mailto:tajubusinessplc@gmail.com"
         class="bg-gray-800 p-3 rounded-lg border border-gray-700 hover:border-yellow-400 transition">

        <h2 class="text-base font-semibold text-yellow-400">Email</h2>
        <p class="text-gray-300 mt-1 text-sm">tajubusinessplc@gmail.com</p>
        <p class="text-xs text-gray-500 mt-1">Click to email</p>

      </a>

      <div class="bg-gray-800 p-3 rounded-lg border border-gray-700">

        <h2 class="text-base font-semibold text-yellow-400">Address</h2>
        <p class="text-gray-300 mt-1 text-sm">
          Kirkos subcity, Woreda 09, Addis Ababa, Ethiopia
        </p>
        <p class="text-xs text-gray-500 mt-1">Main Office</p>

      </div>

    </div>

    <!-- RIGHT: FORM -->
    <div class="w-full md:w-2/3">

      <form id="contactForm"
            action="https://formspree.io/f/xojpjgrg"
            method="POST"
            class="bg-gray-800 p-5 md:p-6 rounded-xl space-y-4 border border-gray-700 shadow-lg">

        <input type="text"
               name="name"
               placeholder="Your Name"
               required
               class="w-full p-3 rounded bg-gray-900 border border-gray-700 text-white text-sm">

        <input type="email"
               name="email"
               placeholder="Your Email"
               required
               class="w-full p-3 rounded bg-gray-900 border border-gray-700 text-white text-sm">

        <textarea name="message"
                  rows="5"
                  placeholder="Your Message"
                  required
                  class="w-full p-3 rounded bg-gray-900 border border-gray-700 text-white text-sm"></textarea>

        <button type="submit"
                class="w-full bg-yellow-500 text-black py-2.5 rounded font-semibold hover:bg-yellow-400 transition active:scale-95 text-sm">
          Send Message
        </button>

      </form>

    </div>

  </div>

</section>

<!-- ================= SUCCESS MESSAGE ================= -->
<div id="successMessage"
     class="hidden fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-green-500 text-black px-4 md:px-6 py-3 rounded-full shadow-lg font-semibold text-sm md:text-base">
  ✅ Message Sent Successfully
</div>

<!-- ================= SCRIPTS ================= -->
<script>
// hamburger toggle (FIXED)
const menuBtn = document.getElementById("menuBtn");
const mobileMenu = document.getElementById("mobileMenu");

function toggleMenu() {
  mobileMenu.classList.toggle("opacity-0");
  mobileMenu.classList.toggle("pointer-events-none");
}

menuBtn.addEventListener("click", toggleMenu);

// close when clicking outside
document.addEventListener("click", function(e) {
  if (!mobileMenu.contains(e.target) && !menuBtn.contains(e.target)) {
    mobileMenu.classList.add("opacity-0");
    mobileMenu.classList.add("pointer-events-none");
  }
});

// auto-fill message
window.onload = function () {
  const params = new URLSearchParams(window.location.search);
  const message = params.get("message");

  if (message) {
    const formatted =
`📩 Equipment Quote Request

${message}

---
Sent from TAJU Equipment Page`;

    document.getElementById("messageBox").value = formatted;
  }
};

// form submit (UNCHANGED)
const form = document.getElementById("contactForm");
const successMessage = document.getElementById("successMessage");

form.addEventListener("submit", async function (e) {
  e.preventDefault();

  const data = new FormData(form);

  await fetch(form.action, {
    method: "POST",
    body: data,
    headers: { "Accept": "application/json" }
  });

  successMessage.classList.remove("hidden");
  form.reset();

  setTimeout(() => {
    successMessage.classList.add("hidden");
  }, 3000);
});
</script>

</body>
</html>
