<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | BLU</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-b from-gray-900 via-gray-800 to-black text-white">

<!-- ================= NAVBAR ================= -->
<nav class="sticky top-0 z-50 backdrop-blur bg-gray-900/70 flex items-center justify-between px-4 md:px-8 py-4 border-b border-gray-700">

  <img src="images/logo.png" class="w-10 md:w-14 mix-blend-screen" />

  <ul class="hidden md:flex space-x-10 text-base md:text-lg font-medium">
    <li><a href="index.html" class="hover:text-yellow-400">Home</a></li>
    <li><a href="equipment.html" class="hover:text-yellow-400">Equipment</a></li>
    <li><a href="contact.html" class="text-yellow-400">Contact</a></li>
  </ul>

</nav>

<!-- ================= HEADER ================= -->
<section class="text-center py-10 px-4">
  <h1 class="text-3xl md:text-4xl font-bold text-yellow-400">
    Send a Message
  </h1>

  <p class="text-gray-300 mt-2 text-sm md:text-base">
    We reply quickly to all requests.
  </p>
</section>

<!-- ================= FORM ================= -->
<section class="max-w-4xl mx-auto px-4 pb-16">

  <form action="https://formspree.io/f/xojpjgrg"
        method="POST"
        class="bg-gray-800 p-5 md:p-8 rounded-xl space-y-4 border border-gray-700 shadow-lg">

    <input type="text"
           name="name"
           placeholder="Your Name"
           class="w-full p-3 rounded bg-gray-900 border border-gray-700 text-white">

    <input type="email"
           name="email"
           placeholder="Your Email"
           class="w-full p-3 rounded bg-gray-900 border border-gray-700 text-white">

    <textarea name="message"
              id="messageBox"
              rows="6"
              placeholder="Your Message"
              class="w-full p-3 rounded bg-gray-900 border border-gray-700 text-white"></textarea>

    <button class="w-full bg-yellow-500 text-black py-3 rounded font-semibold hover:bg-yellow-400 transition">
      Send Message
    </button>

  </form>

</section>

<!-- ================= AUTO FILL SCRIPT ================= -->
<script>
window.onload = function () {
  const params = new URLSearchParams(window.location.search);
  let message = params.get("message");

  if (message) {
    message = decodeURIComponent(message);

    const formatted =
`📩 Equipment Quote Request

${message}

---
Sent from BLU Equipment Page`;

    document.getElementById("messageBox").value = formatted;
  }
};
</script>

</body>
</html>
